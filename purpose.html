<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relationship Quiz</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.container{
    background:white;
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:600px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h1{
    color:#ff4081;
}

.question{
    margin:20px 0;
    text-align:left;
}

select{
    width:100%;
    padding:10px;
    border-radius:10px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    margin:10px;
}

.submit-btn{
    background:#ff4081;
    color:white;
}

.yes{
    background:green;
    color:white;
}

.no{
    background:red;
    color:white;
    position:relative;
}

.hidden{
    display:none;
}

#phone{
    font-size:28px;
    color:green;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

    <!-- Quiz Section -->
    <div id="quiz">
        <h1>Dream Boy Quiz 💖</h1>

        <div class="question">
            <label>1. What type of boy do you like?</label>
            <select>
                <option>Funny</option>
                <option>Smart</option>
                <option>Caring</option>
                <option>Romantic</option>
            </select>
        </div>

        <div class="question">
            <label>2. What is most important?</label>
            <select>
                <option>Respect</option>
                <option>Loyalty</option>
                <option>Looks</option>
                <option>Personality</option>
            </select>
        </div>

        <div class="question">
            <label>3. What should be his hobby?</label>
            <select>
                <option>Traveling</option>
                <option>Gaming</option>
                <option>Sports</option>
                <option>Music</option>
            </select>
        </div>

        <div class="question">
            <label>4. How romantic should he be?</label>
            <select>
                <option>Very Romantic</option>
                <option>Moderate</option>
                <option>Simple</option>
                <option>Doesn't Matter</option>
            </select>
        </div>

        <button class="submit-btn" onclick="showResult()">Submit</button>
    </div>

    <!-- Result Section -->
    <div id="result" class="hidden">
        <h1>Result 💕</h1>
        <h2>The boy matching your choices is:</h2>
        <h1>Ankit Prajapat ❤️</h1>
        <p>Loading next question...</p>
    </div>

    <!-- Proposal Section -->
    <div id="proposal" class="hidden">
        <h1>Relationship Question 💖</h1>
        <h2>Would you like to be in a relationship with Ankit?</h2>

        <button class="yes" onclick="showPhone()">YES</button>
        <button class="no" id="noBtn">NO</button>
    </div>

    <!-- Phone Section -->
    <div id="phoneSection" class="hidden">
        <h1>Contact Ankit 📞</h1>
        <div id="phone">8696638821</div>
    </div>

</div>

<script>

function showResult(){
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");

    setTimeout(()=>{
        document.getElementById("result").classList.add("hidden");
        document.getElementById("proposal").classList.remove("hidden");
    },3000);
}

function showPhone(){
    document.getElementById("proposal").classList.add("hidden");
    document.getElementById("phoneSection").classList.remove("hidden");
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", function(){

    const x = Math.floor(Math.random()*300)-150;
    const y = Math.floor(Math.random()*200)-100;

    noBtn.style.transform = `translate(${x}px, ${y}px)`;
});

</script>

</body>
</html>
